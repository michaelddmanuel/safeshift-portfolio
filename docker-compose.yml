# SafeShift local Postgres (multi-tenant shared DB)
services:
  db:
    image: postgres:15-alpine
    container_name: safeshift-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: safeshift
      POSTGRES_PASSWORD: safeshift
      POSTGRES_DB: safeshift
    ports:
      - "5544:5432"
    volumes:
      - safeshift_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safeshift -d safeshift"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  safeshift_pgdata:
